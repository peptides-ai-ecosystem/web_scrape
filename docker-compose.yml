services:
  scraper:
    build: .
    volumes:
      - ./output_v6:/app/output_v6
    environment:
      - CHROME_BIN=/usr/bin/chromium
      - CHROMEDRIVER_BIN=/usr/bin/chromedriver
    # Chrome needs a larger shared memory space to avoid renderer crashes
    shm_size: '2gb'
    # Required for Chromium sandboxing to work inside Docker
    cap_add:
      - SYS_ADMIN